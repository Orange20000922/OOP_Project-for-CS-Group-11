<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | 学生课表管理系统</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/vue.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">SCNU Schedule Workspace</p>
      <h1>学生课表管理系统</h1>
      <p class="subtle">本页使用 Vue2 维护登录和注册状态，登录后跳转到工作台。</p>
    </div>
  </header>

  <main class="page">
    <section class="auth-shell">
      <div class="panel auth-panel" id="auth-app" v-cloak>
        <h2>{{ panelTitle }}</h2>
        <p class="subtle">本地账号只用于管理课表与笔记；教务系统账号只有在主动抓取课表时才会使用。</p>

        <div class="field-grid">
          <label class="field" v-if="isRegister">
            <span>姓名</span>
            <input v-model.trim="form.name" type="text" placeholder="请输入真实姓名">
          </label>

          <label class="field" v-if="isRegister">
            <span>教务账号（可选）</span>
            <input v-model.trim="form.scnuAccount" type="text" placeholder="默认使用学号">
          </label>

          <label class="field">
            <span>学号</span>
            <input v-model.trim="form.studentId" type="text" placeholder="请输入学号">
          </label>

          <label class="field">
            <span>密码</span>
            <input v-model="form.password" type="password" placeholder="请输入密码" @keyup.enter="submit">
          </label>
        </div>

        <div class="button-row auth-actions">
          <button class="button" type="button" :disabled="loading" @click="submit">{{ loading ? "提交中..." : submitLabel }}</button>
          <button class="button secondary" type="button" :disabled="loading" @click="toggleMode">{{ toggleLabel }}</button>
        </div>

        <div :class="messageClass">{{ messageText }}</div>
      </div>
    </section>
  </main>

  <script defer src="/vendor/vue/vue.js"></script>
  <script defer src="/static/shared.js"></script>
  <script defer src="/static/auth-vue.js"></script>
</body>
</html>
